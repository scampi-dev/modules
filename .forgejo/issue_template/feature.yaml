name: Feature Request
about: A new module, or a new capability for an existing one
title: ""
labels:
  - Kind/Feature
body:
  - type: markdown
    attributes:
      value: |
        Hi, and thanks for sketching a feature idea!

        Module scope is opinionated — a short discussion before you write
        code is usually the cheapest alignment. The fields below help me
        understand the *why* before the *what*.

  - type: textarea
    id: use_case
    attributes:
      label: What are you trying to do?
      description: |
        The real-world scenario. "I'm deploying X and want to manage Y
        because Z" beats "modules should support X" — the use case lets
        us find a good fit even if the proposed shape doesn't land.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed module / capability
      description: |
        What would the module config look like? Sketch is fine — exact
        names aren't important yet.
      render: text
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: |
        Other approaches you thought about, or existing modules that
        almost-but-not-quite cover the case.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: |
        Related issues, examples from other tools, links.
    validations:
      required: false
